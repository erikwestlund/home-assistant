                card_mod:
                  style: |
                    ha-card {
                      font-weight: {% if is_state('input_select.heatpump_room_tab', 'Master Bedroom') %} 700 {% else %} 400 {% endif %};
                      border: 2px solid {% if is_state('input_select.heatpump_room_tab', 'Master Bedroom') %} darkblue {% else %} gray {% endif %};
                    }
              - show_name: true
                show_icon: false
                type: button
                name: Dining Room
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  data:
                    entity_id: input_select.heatpump_room_tab
                    option: Dining Room
                card_mod:
                  style: |
                    ha-card {
                      font-weight: {% if is_state('input_select.heatpump_room_tab', 'Dining Room') %} 700 {% else %} 400 {% endif %};
                      border: 2px solid {% if is_state('input_select.heatpump_room_tab', 'Dining Room') %} darkblue {% else %} gray {% endif %};
                    }
              - show_name: true
                show_icon: false
                type: button
                name: Ducted
