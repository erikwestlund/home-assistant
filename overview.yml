                      border: 2px solid {% if is_state('input_select.heatpump_room_tab', 'Ducted') %} darkblue {% else %} gray {% endif %};
                    }
            grid_options:
              columns: full
              rows: 1
        column_span: 4
      # Office
      - type: grid
        cards:
          - type: heading
            heading: Office
            heading_style: title
            icon: mdi:chair-rolling
            grid_options:
