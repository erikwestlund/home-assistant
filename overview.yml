views:
  - type: sections
    max_columns: 6
    title: HVAC
    path: hvac
    subview: false
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Global Settings
            heading_style: subtitle
            icon: mdi:cog
          - features:
              - type: select-options
            type: tile
            entity: input_select.hvac_mode
            show_entity_picture: false
            vertical: false
            hide_state: false
            state_content:
              - state
              - last_changed
            grid_options:
              columns: 12
              rows: 2
          - features:
              - type: numeric-input
                style: buttons
            type: tile
            entity: input_number.heatpump_mode_threshold_offset
            vertical: false
            hide_state: true
            grid_options:
              columns: 12
              rows: 2
            show_entity_picture: false
            name: Mode Threshold Offset
          - features:
              - type: select-options
            type: tile
            entity: input_select.day_night_mode
            hide_state: true
            vertical: false
            grid_options:
              columns: 12
              rows: 2
          - features:
              - type: select-options
            type: tile
            entity: input_select.day_of_week_status
            hide_state: true
            vertical: false
            grid_options:
              columns: 12
              rows: 2
            name: Weekday/Weekend
            icon: mdi:calendar
          - features:
              - type: numeric-input
                style: buttons
            type: tile
            entity: input_number.heatpumps_away_setpoint
            grid_options:
              columns: 12
              rows: 1
            vertical: false
            name: Away Setpoint (Heat Pumps)
            color: accent
            icon: mdi:heat-pump-outline
          - type: tile
            entity: input_number.radiators_away_setpoint
            grid_options:
              columns: 12
              rows: 1
            vertical: false
            name: Away Setpoint (Radiators)
            icon: mdi:heating-coil
            color: red
            features:
              - type: numeric-input
                style: buttons
          - type: tile
            entity: input_boolean.office_early_work_mode
            vertical: true
            name: Early Work Mode
            state_content: last_changed
            grid_options:
              columns: 12
              rows: 2
          - type: tile
            entity: input_boolean.hvac_away_mode
            grid_options:
              columns: 12
              rows: 1
            vertical: true
            hide_state: false
            state_content: state
          - type: tile
            entity: binary_sensor.daytime_status
            name: Currently Daytime
            vertical: true
            state_content: state
            grid_options:
              columns: 12
              rows: 1
          - type: tile
            entity: input_datetime.day_start_time
            vertical: true
            hide_state: false
            state_content: state
            grid_options:
              columns: 12
              rows: 1
          - type: tile
            entity: input_datetime.night_start_time
            vertical: true
            state_content: state
            grid_options:
              columns: 12
              rows: 1
        column_span: 4
      - type: grid
        cards:
          - type: heading
            icon: mdi:heat-wave
            heading_style: subtitle
            heading: Select A Room
            grid_options:
              columns: full
              rows: 1
          - type: horizontal-stack
            cards:
              - show_name: true
                show_icon: false
                type: button
                name: Office
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  data:
                    entity_id: input_select.heatpump_room_tab
                    option: Office
                card_mod:
                  style: |
                    ha-card {
                      font-weight: {% if is_state('input_select.heatpump_room_tab', 'Office') %} 700 {% else %} 400 {% endif %};
                      border: 2px solid {% if is_state('input_select.heatpump_room_tab', 'Office') %} darkblue {% else %} gray {% endif %};
                    }
              - show_name: true
                show_icon: false
                type: button
                name: Family Room
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  data:
                    entity_id: input_select.heatpump_room_tab
                    option: Family Room
                card_mod:
                  style: |
                    ha-card {
                      font-weight: {% if is_state('input_select.heatpump_room_tab', 'Family Room') %} 700 {% else %} 400 {% endif %};
                      border: 2px solid {% if is_state('input_select.heatpump_room_tab', 'Family Room') %} darkblue {% else %} gray {% endif %};
                    }
              - show_name: true
                show_icon: false
                type: button
                name: Living Room
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  data:
                    entity_id: input_select.heatpump_room_tab
                    option: Living Room
                card_mod:
                  style: |
                    ha-card {
                      font-weight: {% if is_state('input_select.heatpump_room_tab', 'Living Room') %} 700 {% else %} 400 {% endif %};
                      border: 2px solid {% if is_state('input_select.heatpump_room_tab', 'Living Room') %} darkblue {% else %} gray {% endif %};
                    }
              - show_name: true
                show_icon: false
                type: button
                name: Master Bedroom
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  data:
                    entity_id: input_select.heatpump_room_tab
