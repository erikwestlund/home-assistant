- id: set_day_of_week_status
  alias: "Set Day of Week Status"
  trigger:
    - platform: time
      at: "00:00:00"  # Runs every day at midnight
  action:
    - service: input_select.select_option
      data:
        entity_id: input_select.day_of_week_status
        option: >
          {% set today = now().date() %}
          {% set holidays = [
            now().replace(month=12, day=25).date(),  # Christmas
            now().replace(month=1, day=1).date(),   # New Year's Day
            now().replace(month=7, day=4).date()    # Independence Day
          ] %}
          {% if today.weekday() in [5, 6] %}  # Saturday or Sunday
            "Weekend"
          {% elif today in holidays %}
            "Weekend"
          {% else %}
            "Weekday"
          {% endif %}