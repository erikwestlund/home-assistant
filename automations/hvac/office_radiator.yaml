- id: set_office_radiator_temperature
  alias: "Set Office Radiator Temperature"
  description: "Adjust the radiator temperature based on HVAC mode, occupancy, and time of day."
  trigger:
    - platform: state
      entity_id:
        - input_select.day_of_week_status
        - binary_sensor.daytime_status
        - binary_sensor.office_occupied
        - input_datetime.office_apply_occupied_start_time
        - input_datetime.office_apply_occupied_end_time
        - input_select.hvac_mode
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: state
      entity_id: input_select.hvac_mode
      state: "Heat"
  action:
    - service: logbook.log
      data:
        name: "Office Radiator Automation"
        message: >
          Variables: current_time={{ now().timestamp() }},
          occupied_start={{ now().strftime('%Y-%m-%d') ~ 'T' ~ states('input_datetime.office_apply_occupied_start_time') }},
          occupied_end={{ now().strftime('%Y-%m-%d') ~ 'T' ~ states('input_datetime.office_apply_occupied_end_time') }},
          is_daytime={{ is_state('binary_sensor.daytime_status', 'on') }},
          is_occupied={% if occupied_start <= current_time <= occupied_end %}{{ is_state('binary_sensor.office_occupied', 'on') }}{% else %}false{% endif %},
          is_weekday={{ is_state('input_select.day_of_week_status', 'Weekday') }}
    - choose:
        # Nighttime temperature
        - conditions:
            - condition: template
              value_template: "{{ not is_state('binary_sensor.daytime_status', 'on') }}"
          sequence:
            - service: climate.set_temperature
              data:
                entity_id: climate.office
                temperature: "{{ states('input_number.office_radiator_night_setpoint') | float(0) }}"
            - service: logbook.log
              data:
                name: "Office Radiator Automation"
                message: "Set nighttime temperature."
        # Daytime temperature
        - conditions:
            - condition: template
              value_template: "{{ is_state('binary_sensor.daytime_status', 'on') }}"
          sequence:
            - choose:
                # Weekday and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_state('input_select.day_of_week_status', 'Weekday') and is_occupied == true }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_occupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Set weekday occupied temperature."
                # Weekday and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_state('input_select.day_of_week_status', 'Weekday') and is_occupied == false }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_unoccupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Set weekday unoccupied temperature."
                # Weekend and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_state('input_select.day_of_week_status', 'Weekday') and is_occupied == true }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_occupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Set weekend occupied temperature."
                # Weekend and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_state('input_select.day_of_week_status', 'Weekday') and is_occupied == false }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_unoccupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Set weekend unoccupied temperature."
  mode: single