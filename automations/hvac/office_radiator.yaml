- id: set_office_radiator_temperature
  alias: "Set Office Radiator Temperature"
  description: "Adjust the radiator temperature based on HVAC mode, occupancy, and time of day."
  trigger:
    - platform: state
      entity_id:
        - input_select.day_of_week_status
        - binary_sensor.daytime_status
        - binary_sensor.office_occupied
        - input_datetime.office_apply_occupied_start_time
        - input_datetime.office_apply_occupied_end_time
        - input_select.hvac_mode
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: state
      entity_id: input_select.hvac_mode
      state: "Heat"
  action:
    - variables:
        current_time: "{{ now().timestamp() }}"
        occupied_start: >-
          {{ as_timestamp(states('input_datetime.office_apply_occupied_start_time') | default('1970-01-01T00:00:00')) | float(0) }}
        occupied_end: >-
          {{ as_timestamp(states('input_datetime.office_apply_occupied_end_time') | default('1970-01-01T23:59:59')) | float(0) }}
        is_daytime: "{{ is_state('binary_sensor.daytime_status', 'on') }}"
        is_occupied: >-
          {% if occupied_start <= current_time <= occupied_end %}
            {{ is_state('binary_sensor.office_occupied', 'on') }}
          {% else %}
            false
          {% endif %}
        is_weekday: "{{ is_state('input_select.day_of_week_status', 'Weekday') }}"
    - service: logbook.log
      data:
        name: "Office Radiator Debug"
        message: >
          current_time: {{ current_time }},
          occupied_start: {{ occupied_start }},
          occupied_end: {{ occupied_end }},
          is_daytime: {{ is_daytime }},
          is_occupied: {{ is_occupied }},
          is_weekday: {{ is_weekday }}
    - choose:
        # Nighttime temperature
        - conditions:
            - condition: template
              value_template: "{{ not is_daytime }}"
          sequence:
            - service: climate.set_temperature
              data:
                entity_id: climate.office
                temperature: "{{ states('input_number.office_radiator_night_setpoint') | float(0) }}"
            - service: logbook.log
              data:
                name: "Office Radiator"
                message: "Set nighttime temperature."
        # Daytime temperature
        - conditions:
            - condition: template
              value_template: "{{ is_daytime }}"
          sequence:
            - choose:
                # Weekday and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekday and is_occupied == true }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_occupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator"
                        message: "Set weekday occupied temperature."
                # Weekday and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekday and is_occupied == false }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_unoccupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator"
                        message: "Set weekday unoccupied temperature."
                # Weekend and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekday and is_occupied == true }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_occupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator"
                        message: "Set weekend occupied temperature."
                # Weekend and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekday and is_occupied == false }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_unoccupied_setpoint') | float(0) }}"
                    - service: logbook.log
                      data:
                        name: "Office Radiator"
                        message: "Set weekend unoccupied temperature."
  mode: single