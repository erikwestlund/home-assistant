- id: set_office_radiator_temperature_with_debug
  alias: "Set Office Radiator Temperature with Debug Logging"
  description: "Adjust the radiator temperature based on HVAC mode, occupancy, and time of day, with detailed logging."
  trigger:
    - platform: state
      entity_id:
        - input_select.day_of_week_status
        - binary_sensor.daytime_status
        - binary_sensor.office_occupied
        - input_datetime.office_apply_occupied_start_time
        - input_datetime.office_apply_occupied_end_time
        - input_select.hvac_mode
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: state
      entity_id: input_select.hvac_mode
      state: "Heat"
  action:
    - variables:
        current_time: "{{ now().timestamp() }}"
        occupied_start: >-
          {{ as_timestamp(now().strftime('%Y-%m-%d') ~ 'T' ~ 
          (states('input_datetime.office_apply_occupied_start_time') | default('00:00:00'))) }}
        occupied_end: >-
          {{ as_timestamp(now().strftime('%Y-%m-%d') ~ 'T' ~ 
          (states('input_datetime.office_apply_occupied_end_time') | default('23:59:59'))) }}
        is_daytime: "{{ is_state('binary_sensor.daytime_status', 'on') }}"
        is_occupied: >-
          {% if occupied_start <= current_time <= occupied_end %}
            {{ is_state('binary_sensor.office_occupied', 'on') }}
          {% else %}
            False
          {% endif %}
        is_weekday: "{{ is_state('input_select.day_of_week_status', 'Weekday') }}"
    - service: logbook.log
      data:
        name: "Office Radiator Automation"
        message: >
          Debugging Variables: 
          current_time={{ current_time }},
          occupied_start={{ occupied_start }},
          occupied_end={{ occupied_end }},
          is_daytime={{ is_daytime }},
          is_occupied={{ is_occupied }},
          is_weekday={{ is_weekday }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_daytime }}"
          sequence:
            - service: logbook.log
              data:
                name: "Office Radiator Automation"
                message: "Daytime detected. Determining weekday/weekend and occupancy."
            - choose:
                # Weekday and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekday and is_occupied }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Weekday and occupied. Setting to weekday occupied setpoint."
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_occupied_setpoint') | float(0) }}"
                # Weekday and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekday and not is_occupied }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Weekday and unoccupied. Setting to weekday unoccupied setpoint."
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_unoccupied_setpoint') | float(0) }}"
                # Weekend and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekday and is_occupied == true }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Weekend and occupied. Setting to weekend occupied setpoint."
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_occupied_setpoint') | float(0) }}"
                # Weekend and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekday and is_occupied == false }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Radiator Automation"
                        message: "Weekend and unoccupied. Setting to weekend unoccupied setpoint."
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_unoccupied_setpoint') | float(0) }}"
  mode: single