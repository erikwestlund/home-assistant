- id: set_office_radiator_setpoint
  alias: "Set Office Radiator Setpoint"
  description: "Set the radiator temperature based on the HVAC mode, occupancy, and day of the week."
  trigger:
    - platform: state
      entity_id:
        - input_select.hvac_mode
        - input_select.day_night_mode
        - input_datetime.office_apply_occupied_start_time
        - input_datetime.office_apply_occupied_end_time
        - binary_sensor.office_occupied
        - input_select.day_of_week_status
    - platform: time
      at: "00:00:00"  # Ensure recalculation at midnight every day
  condition:
    - condition: state
      entity_id: input_select.hvac_mode
      state: "heat"
  action:
    - variables:
        is_daytime: "{{ is_state('binary_sensor.daytime_status', 'on') }}"
        is_occupied: >
          {% set now_time = now().time() %}
          {% set occupied_start = states('input_datetime.office_apply_occupied_start_time') | as_datetime(false).time() %}
          {% set occupied_end = states('input_datetime.office_apply_occupied_end_time') | as_datetime(false).time() %}
          {% if now_time >= occupied_start and now_time <= occupied_end %}
            {{ is_state('binary_sensor.office_occupied', 'on') }}
          {% else %}
            false
          {% endif %}
        is_weekend: "{{ is_state('input_select.day_of_week_status', 'Weekend') }}"
    - choose:
        # Nighttime setpoint
        - conditions:
            - condition: template
              value_template: "{{ not is_daytime }}"
          sequence:
            - service: climate.set_temperature
              data:
                entity_id: climate.office
                temperature: "{{ states('input_number.office_radiator_night_setpoint') | float }}"
        # Daytime setpoint
        - conditions:
            - condition: template
              value_template: "{{ is_daytime }}"
          sequence:
            - choose:
                # Weekday Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekend and is_occupied }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_occupied_setpoint') | float }}"
                # Weekday Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekend and not is_occupied }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekday_unoccupied_setpoint') | float }}"
                # Weekend Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekend and is_occupied }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_occupied_setpoint') | float }}"
                # Weekend Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekend and not is_occupied }}"
                  sequence:
                    - service: climate.set_temperature
                      data:
                        entity_id: climate.office
                        temperature: "{{ states('input_number.office_radiator_weekend_unoccupied_setpoint') | float }}"
  mode: single