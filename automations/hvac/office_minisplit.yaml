- id: set_office_heatpump_setpoint
  alias: "Set Office Mini Split Setpoint"
  description: "Adjust the mini split setpoint based on HVAC mode, occupancy, and time of day, with detailed logging and override functionality."
  trigger:
    - platform: state
      entity_id:
        - input_boolean.hvac_away_mode
        - input_select.day_of_week_status
        - binary_sensor.daytime_status
        - binary_sensor.office_occupied
        - input_boolean.office_overheated_status
        - input_boolean.office_early_work_mode
        - input_boolean.office_override_status
        - input_datetime.office_apply_occupied_start_time
        - input_datetime.office_apply_occupied_end_time
        - input_datetime.office_early_work_mode_day_start_time
        - input_datetime.office_override_until
        - input_select.hvac_mode
        - input_select.office_heatpump_state
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: state
      entity_id: input_select.hvac_mode
      state: "Heat"
    - condition: state
      entity_id: input_boolean.hvac_away_mode
      state: "off"
  action:
    - variables:
        current_time: "{{ now().timestamp() }}"
        occupied_start: >-
          {{ as_timestamp(now().strftime('%Y-%m-%d') ~ 'T' ~ 
          (states('input_datetime.office_apply_occupied_start_time') | default('09:00:00'))) }}
        occupied_end: >-
          {{ as_timestamp(now().strftime('%Y-%m-%d') ~ 'T' ~ 
          (states('input_datetime.office_apply_occupied_end_time') | default('20:59:00'))) }}
        is_early_work_mode: "{{ is_state('input_boolean.office_early_work_mode', 'on') }}"
        is_daytime: >-
          {% if is_early_work_mode %}
            {{ now().timestamp() >= as_timestamp(now().strftime('%Y-%m-%d') ~ 'T' ~ 
            (states('input_datetime.office_early_work_mode_day_start_time') | default('03:00:00'))) }}
          {% else %}
            {{ is_state('binary_sensor.daytime_status', 'on') }}
          {% endif %}
        is_occupied: >-
          {% if is_early_work_mode %}
            True
          {% elif occupied_start <= current_time <= occupied_end %}
            {{ is_state('binary_sensor.office_occupied', 'on') }}
          {% else %}
            False
          {% endif %}
        is_weekday: "{{ is_state('input_select.day_of_week_status', 'Weekday') }}"
        is_overheated: "{{ is_state('input_boolean.office_overheated_status', 'on') }}"
        override_active: >-
          {{ is_state('input_boolean.office_override_status', 'on') and 
          now().timestamp() < as_timestamp(states('input_datetime.office_override_until')) }}
    - service: logbook.log
      data:
        name: "Office Mini Split Automation"
        message: >
          Debugging Variables:
          current_time={{ current_time }},
          occupied_start={{ occupied_start }},
          occupied_end={{ occupied_end }},
          is_early_work_mode={{ is_early_work_mode }},
          is_daytime={{ is_daytime }},
          is_occupied={{ is_occupied }},
          is_weekday={{ is_weekday }},
          is_overheated={{ is_overheated }},
          override_active={{ override_active }}
    - choose:
        # Override logic
        - conditions:
            - condition: template
              value_template: "{{ override_active }}"
          sequence:
            - service: logbook.log
              data:
                name: "Office Mini Split Automation"
                message: "Override active. Setting mini split to override setpoint."
            - service: input_select.select_option
              data:
                entity_id: input_select.office_heatpump_setpoint_current
                option: "Override"
        # Overheating logic
        - conditions:
            - condition: template
              value_template: "{{ is_overheated }}"
          sequence:
            - service: logbook.log
              data:
                name: "Office Mini Split Automation"
                message: "Overheating detected. Setting mini split to overheated setpoint."
            - service: input_select.select_option
              data:
                entity_id: input_select.office_heatpump_setpoint_current
                option: "Overheated"
        # Nighttime logic
        - conditions:
            - condition: template
              value_template: "{{ not is_daytime }}"
          sequence:
            - service: logbook.log
              data:
                name: "Office Mini Split Automation"
                message: "Nighttime detected. Setting mini split to nighttime setpoint."
            - service: input_select.select_option
              data:
                entity_id: input_select.office_heatpump_setpoint_current
                option: "Night"
        # Daytime logic
        - conditions:
            - condition: template
              value_template: "{{ is_daytime }}"
          sequence:
            - service: logbook.log
              data:
                name: "Office Mini Split Automation"
                message: "Daytime detected. Determining weekday/weekend and occupancy."
            - choose:
                # Supplemental mode
                - conditions:
                    - condition: template
                      value_template: "{{ heatpump_mode == 'Supplement' }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Mini Split Automation"
                        message: "Supplemental mode detected. Setting mini split to supplemental setpoint."
                    - service: input_select.select_option
                      data:
                        entity_id: input_select.office_heatpump_setpoint_current
                        option: "Supplemental"
                # Weekday and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekday and is_occupied }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Mini Split Automation"
                        message: "Weekday and occupied. Setting mini split to weekday occupied setpoint."
                    - service: input_select.select_option
                      data:
                        entity_id: input_select.office_heatpump_setpoint_current
                        option: "Weekday Occupied"
                # Weekday and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ is_weekday and not is_occupied }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Mini Split Automation"
                        message: "Weekday and unoccupied. Setting mini split to weekday unoccupied setpoint."
                    - service: input_select.select_option
                      data:
                        entity_id: input_select.office_heatpump_setpoint_current
                        option: "Weekday Unoccupied"
                # Weekend and Occupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekday and is_occupied }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Mini Split Automation"
                        message: "Weekend and occupied. Setting mini split to weekend occupied setpoint."
                    - service: input_select.select_option
                      data:
                        entity_id: input_select.office_heatpump_setpoint_current
                        option: "Weekend Occupied"
                # Weekend and Unoccupied
                - conditions:
                    - condition: template
                      value_template: "{{ not is_weekday and not is_occupied }}"
                  sequence:
                    - service: logbook.log
                      data:
                        name: "Office Mini Split Automation"
                        message: "Weekend and unoccupied. Setting mini split to weekend unoccupied setpoint."
                    - service: input_select.select_option
                      data:
                        entity_id: input_select.office_heatpump_setpoint_current
                        option: "Weekend Unoccupied"
  mode: single

- id: update_office_heatpump_temperature
  alias: "Update Office Mini Split Temperature"
  description: "Adjust the mini split temperature when the setpoint changes, only if the thermostat temperature differs."
  trigger:
    - platform: state
      entity_id: input_select.office_heatpump_setpoint_current
  action:
    - variables:
        current_setpoint: "{{ states('input_select.office_heatpump_setpoint_current') }}"
        override_setpoint: "{{ states('input_number.office_override_setpoint') | float(0) }}"
        supplemental_setpoint: "{{ states('input_number.office_heatpump_supplemental_setpoint') | float(0) }}"
        overheat_setpoint: "{{ states('input_number.office_heatpump_overheat_setpoint') | float(0) }}"
        night_setpoint: "{{ states('input_number.office_heatpump_comfort_night_setpoint') | float(0) }}"
        weekday_occupied_setpoint: "{{ states('input_number.office_heatpump_comfort_weekday_occupied_setpoint') | float(0) }}"
        weekday_unoccupied_setpoint: "{{ states('input_number.office_heatpump_comfort_weekday_unoccupied_setpoint') | float(0) }}"
        weekend_occupied_setpoint: "{{ states('input_number.office_heatpump_comfort_weekend_occupied_setpoint') | float(0) }}"
        weekend_unoccupied_setpoint: "{{ states('input_number.office_heatpump_comfort_weekend_unoccupied_setpoint') | float(0) }}"
        thermostat_temperature: "{{ state_attr('climate.tinas_office_heat_pump', 'temperature') | float(0) }}"
        new_temperature: >-
          {% if current_setpoint == 'Override' %}
            {{ override_setpoint }}
          {% elif current_setpoint == 'Supplemental' %}
            {{ supplemental_setpoint }}
          {% elif current_setpoint == 'Overheated' %}
            {{ overheat_setpoint }}
          {% elif current_setpoint == 'Night' %}
            {{ night_setpoint }}
          {% elif current_setpoint == 'Weekday Occupied' %}
            {{ weekday_occupied_setpoint }}
          {% elif current_setpoint == 'Weekday Unoccupied' %}
            {{ weekday_unoccupied_setpoint }}
          {% elif current_setpoint == 'Weekend Occupied' %}
            {{ weekend_occupied_setpoint }}
          {% elif current_setpoint == 'Weekend Unoccupied' %}
            {{ weekend_unoccupied_setpoint }}
          {% else %}
            none
          {% endif %}
    - service: logbook.log
      data:
        name: "Office Mini Split Setpoint Automation"
        message: >
          Current setpoint: {{ current_setpoint }}. 
          Current thermostat temperature: {{ thermostat_temperature }}°. 
          New thermostat temperature: {{ new_temperature }}°.
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ thermostat_temperature != new_temperature }}"
          sequence:
            - service: climate.set_temperature
              data:
                entity_id: climate.tinas_office_heat_pump
                temperature: "{{ new_temperature }}"
            - service: logbook.log
              data:
                name: "Office Mini Split Setpoint Automation"
                message: >
                  Temperature updated to {{ new_temperature }}° 
                  from {{ thermostat_temperature }}°. 
                  Setpoint: {{ current_setpoint }}.
        - default:
            - service: logbook.log
              data:
                name: "Office Mini Split Setpoint Automation"
                message: >
                  No temperature change required. 
                  Current: {{ thermostat_temperature }}°. 
                  Desired: {{ new_temperature }}°.